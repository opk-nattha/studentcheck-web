<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        
        /* 1. รีเซ็ตค่าเริ่มต้นของเบราว์เซอร์ให้ตรงกันทุกเครื่อง */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #ffffff;
        }

        /* 2. ตั้งค่าพื้นหลังของหน้าเว็บ (body) */
        body {
            /* ใช้ฟอนต์มาตรฐานที่อ่านง่าย */
            font-family: 'Chakra Petch';

            /* สีพื้นหลัง */
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            
            /* บังคับให้ความสูงขั้นต่ำเท่ากับ 100% ของหน้าจอ (Viewport Height) */
            min-height: 100vh;
            
            /* เตรียมความพร้อมสำหรับการจัดกลางหน้าจอ (เดี๋ยวเราจะเอาแอพมาวางตรงกลาง) */
            display: flex;
            justify-content: center;
            align-items: top;
            padding: 20px;
        }
    </style>
</head>
<body>

    <h1>ระบบเช็คชื่อเข้าแถว</h1>
    
</body>
</html>
