<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    
    <link rel="icon" type="svg+xml" href="Asset/icon/logo.svg">
    <link rel="alternate icon" type="image/png" href="Asset/icon/favicon-32x32.png">
    <link rel="shortcut icon" href="Asset/icon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="Asset/icon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student Check">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: #ffffff; /* พื้นหลังสีขาวล้วน */
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* ==========================================
           หน้าจอ Boot (Splash Screen)
           ========================================== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f4f8; /* สีพื้นหลังของหน้าโหลด */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: hideSplash 3.5s ease-in-out forwards;
        }

        .splash-logo {
            width: 512px;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out forwards;
        }

        /* ==========================================
           คิวแอนิเมชัน
           ========================================== */
        @keyframes fadeInOut {
            0%   { opacity: 0; transform: scale(0.9); }
            20%  { opacity: 1; transform: scale(1); }
            80%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        @keyframes hideSplash {
            0%   { opacity: 1; visibility: visible; }
            85%  { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* ==========================================
           iPhone SE2 / Mobile Responsive
           ========================================== */
        @media screen and (max-width: 750px) {
            .splash-logo {
                width: 256px;
                opacity: 0;
                animation: fadeInOut 3s ease-in-out forwards;
            }
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="Asset/icon/intro-logo.svg" alt="Intro Logo" class="splash-logo">
    </div>
    
    </body>
</html>
