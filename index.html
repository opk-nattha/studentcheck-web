<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        
        /* 1. รีเซ็ตค่าเริ่มต้นของเบราว์เซอร์ให้ตรงกันทุกเครื่อง */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #ffffff;
        }

        /* 2. ตั้งค่าพื้นหลังของหน้าเว็บ (body) */
        body {
            font-family: 'Chakra Petch';
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: top;
            padding: 20px;
            /* svg */
            overflow: hidden; 
            position: relative;
        }
        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* ดันไปอยู่หลังสุด */
            opacity: 0.6; /* ปรับความโปร่งใสไม่ให้กวนสายตา */
        }

        .app-container {
            background-color: #ffffff; /* กรอบสีขาว */
            
            /* บังพื้นหลังบ้าง แต่ไม่หมด: กำหนดให้กว้าง 90% แต่ไม่เกิน 600px */
            width: 90%; 
            max-width: 600px; 
            
            /* ทำให้กรอบสูงขึ้น แต่เหลือขอบบน-ล่างไว้โชว์พื้นหลัง (80vh = 80% ของจอ) */
            min-height: 80vh; 
            
            /* เส้นขอบเล็กๆ สีกรมท่า (Navy Blue) */
            border: 2px solid #1a365d; 
            
            border-radius: 20px; /* มุมโค้งมนนิดๆ ดูละมุน */
            padding: 30px; /* ระยะห่างขอบด้านใน */
            
            /* ใส่เงาบางๆ ให้กล่องลอยขึ้นมาจากพื้นหลัง */
            box-shadow: 0 12px 35px rgba(26, 54, 93, 0.15); 
            z-index: 1; 

            /* จัดเรียงของข้างในให้อยู่ตรงกลาง */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1a365d; /* สีตัวหนังสือเข้ากับสีกรอบ */
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px; /* ดันให้ห่างจากปุ่มรายชื่อที่จะตามมา */
        }
        
    </style>
</head>
<body>
    <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15"></feGaussianBlur>
            </filter>
        </defs>
        <circle cx="20" cy="20" r="30" fill="#00bf63" filter="url(#blur)"></circle>
        <circle cx="80" cy="80" r="40" fill="#00bf63" filter="url(#blur)"></circle>
    </svg>

    <div class="app-container">
        <h1>ระบบเช็คชื่อเข้าแถว</h1>
        </div>
    
</body>
</html>
