<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    <link rel="icon" type="svg+xml" href="Asset/icon/logo.svg">
    <link rel="alternate icon" type="image/png" href="Asset/icon/favicon-32x32.png">
    <link rel="shortcut icon" href="Asset/icon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="Asset/icon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student Check">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Chakra Petch';
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: top;
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            /* svg */
            overflow: hidden; 
            position: relative;
        }
        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
        /* ==========================================
           กรอบสีขาวขนาดใหญ่
           ========================================== */
        .app-container {
            background-color: #ffffff; 
            border: 2px solid #1a365d; 
            border-radius: 20px; 
            box-shadow: 0 12px 35px rgba(26, 54, 93, 0.15); 
            z-index: 1; 
            width: 90%;
            max-width: 512px;
            margin: 20px;
            height: 95dvh;
            display: flex;
            flex-direction: column;
            padding: 25px;
        }

        /* ==========================================
           ตกแต่งหน้าจอ Splash Screen
           ========================================== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: hideSplash 3.5s ease-in-out forwards;
        }

        .splash-logo {
            width: 512px;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out forwards;
        }

        /* ==========================================
           คิวแอนิเมชัน
           ========================================== */
        
        /* แอนิเมชันสำหรับตัวโลโก้ */
        @keyframes fadeInOut {
            0%   { opacity: 0; transform: scale(0.9); }
            20%  { opacity: 1; transform: scale(1); }
            80%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* แอนิเมชันสำหรับพื้นหลังหน้าโหลด */
        @keyframes hideSplash {
            0%   { opacity: 1; visibility: visible; }
            85%  { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* ==========================================
           iPhone SE2
           ========================================== */
        @media screen and (max-width: 750px) {
            .app-container {
                border-radius: 12px;
                padding: 16px;
                height: 92dvh; /* บนมือถือยอมให้สูงขึ้นอีกนิด */
            }
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="Asset/icon/intro-logo.svg" alt="Intro Logo" class="splash-logo">
    </div>
    
    <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15"></feGaussianBlur>
            </filter>
        </defs>
        <circle cx="20" cy="20" r="30" fill="#00bf63" filter="url(#blur)"></circle>
        <circle cx="80" cy="80" r="40" fill="#00bf63" filter="url(#blur)"></circle>
    </svg>

    <div class="app-container">
        <h1>ระบบเช็คชื่อเข้าแถว</h1>
        </div>
    
</body>
</html>
