<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    
    <style>
        /* 1. รีเซ็ตค่าเริ่มต้นของเบราว์เซอร์ให้ตรงกันทุกเครื่อง */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 2. ตั้งค่าพื้นหลังของหน้าเว็บ (body) */
        body {
            /* ใช้ฟอนต์มาตรฐานที่อ่านง่าย */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* สร้างพื้นหลังแบบไล่สี (Gradient) จากขาวไปเทาอ่อน ดูหรูหรา */
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            
            /* บังคับให้ความสูงขั้นต่ำเท่ากับ 100% ของหน้าจอ (Viewport Height) */
            min-height: 100vh;
            
            /* เตรียมความพร้อมสำหรับการจัดกลางหน้าจอ (เดี๋ยวเราจะเอาแอพมาวางตรงกลาง) */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    </body>
</html>
