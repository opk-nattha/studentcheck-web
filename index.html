<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon.ico"> <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student Check"> <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        
        /* 1. รีเซ็ตค่าเริ่มต้นของเบราว์เซอร์ให้ตรงกันทุกเครื่อง */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 2. ตั้งค่าพื้นหลังของหน้าเว็บ (body) */
        body {
            font-family: 'Chakra Petch';
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: top;
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            /* svg */
            overflow: hidden; 
            position: relative;
        }
        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* ดันไปอยู่หลังสุด */
            opacity: 0.6; /* ปรับความโปร่งใสไม่ให้กวนสายตา */
        }

        .app-container {
            background-color: #ffffff; 
            border: 2px solid #1a365d; 
            border-radius: 20px; 
            box-shadow: 0 12px 35px rgba(26, 54, 93, 0.15); 
            z-index: 1; 

            /* 1. จัดการความกว้างแบบยืดหยุ่น */
            width: 100%;
            margin: 20px; /* บังคับเว้นระยะจากขอบจอทุกด้าน 20px เสมอ (จะได้เห็นพื้นหลัง) */

            /* 2. จัดการความสูงไม่ให้ล้นจอ */
            max-height: 90vh; /* สูงสุดได้แค่ 90% ของหน้าจอ */
            
            /* 3. จัดเลย์เอาต์ภายใน */
            display: flex;
            flex-direction: column; /* เรียงของจากบนลงล่าง */
            padding: 25px; 
        }

    </style>
</head>
<body>
    <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15"></feGaussianBlur>
            </filter>
        </defs>
        <circle cx="20" cy="20" r="30" fill="#00bf63" filter="url(#blur)"></circle>
        <circle cx="80" cy="80" r="40" fill="#00bf63" filter="url(#blur)"></circle>
    </svg>

    <div class="app-container">
        <h1>ระบบเช็คชื่อเข้าแถว</h1>
        </div>
    
</body>
</html>
