<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Student Check — PKC 505</title>

  <!-- Icons (คงเดิมจาก Web project) -->
  <link rel="icon" type="image/svg+xml" href="Asset/icon/logo.svg">
  <link rel="alternate icon" type="image/png" href="Asset/icon/favicon-32x32.png">
  <link rel="shortcut icon" href="Asset/icon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="Asset/icon/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Student Check">
  <meta name="theme-color" content="#1a1a2e">

  <!-- CSS -->
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <!-- ===== Splash Screen (โหลดจาก GitHub ตามเดิม) ===== -->
  <div id="splash-screen" aria-hidden="true">
    <img src="Asset/icon/intro-logo.svg" alt="Student Check" class="splash-logo">
  </div>

  <!-- ===== App ===== -->
  <div id="app">

    <!-- Header -->
    <header class="app-header" id="app-header"></header>

    <!-- Summary bar: มา / ลา / ขาด / ไม่ได้เช็ค -->
    <div class="summary-bar" id="summary-bar" role="region" aria-label="สรุปยอด"></div>

    <!-- Top 3 ที่มาก่อน -->
    <div class="top-ranks" id="top-ranks" role="region" aria-label="อันดับที่มาก่อน"></div>

    <!-- Action buttons -->
    <div class="action-bar" id="action-bar"></div>

    <!-- Grid นักเรียน 40 คน -->
    <main class="students-grid" id="students-grid" role="main" aria-label="รายชื่อนักเรียน"></main>

    <!-- Footer -->
    <footer class="app-footer" id="app-footer"></footer>

  </div>

  <!-- ===== Scripts (ES Modules) ===== -->
  <script type="module" src="src/app.js"></script>

</body>
</html>
