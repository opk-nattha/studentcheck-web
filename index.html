<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Check</title>
  <link rel="icon" type="image/svg+xml" href="Asset/icon/logo.svg">
  <link rel="alternate icon" type="image/png" href="Asset/icon/favicon-32x32.png">
  <link rel="shortcut icon" href="Asset/icon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="Asset/icon/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Student Check">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ─── Reset & Variables ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-bg: #ffffff;
      --c-surface: #f8fafc;
      --c-border: #e2e8f0;
      --c-text: #1e293b;
      --c-muted: #64748b;
      --c-present: #00BF63;
      --c-absent: #FF4F4F;
      --c-leave: #FFB000;
      --c-unchecked: #94A3B8;
      --c-present-bg: #e8fdf1;
      --c-absent-bg: #fff0f0;
      --c-leave-bg: #fff8e6;
      --c-unchecked-bg: #f1f5f9;
      --r-card: 14px;
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.10);
      --transition: 0.18s ease;
      --font: 'Prompt', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--c-bg);
      font-family: var(--font);
      color: var(--c-text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Splash Screen ─── */
    #splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #f0f4f8;
      display: flex; align-items: center; justify-content: center;
      animation: splashHide 3.5s ease-in-out forwards;
      pointer-events: none;
    }
    .splash-logo {
      width: 460px; max-width: 70vw;
      opacity: 0;
      animation: splashFade 3s ease-in-out forwards;
    }
    @keyframes splashFade {
      0%   { opacity: 0; transform: scale(0.9); }
      20%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }
    @keyframes splashHide {
      0%,85% { opacity: 1; visibility: visible; }
      100%   { opacity: 0; visibility: hidden; pointer-events: none; }
    }

    /* ─── App Layout ─── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ─── */
    #app-header {
      flex-shrink: 0;
      background: var(--c-bg);
      border-bottom: 1px solid var(--c-border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      z-index: 100;
    }
    .header-logo {
      height: 36px; width: auto; flex-shrink: 0;
    }
    .header-datetime {
      display: flex; flex-direction: column;
      line-height: 1.2;
      flex-shrink: 0;
    }
    .header-day  { font-size: 11px; color: var(--c-muted); font-weight: 400; }
    .header-date { font-size: 13px; font-weight: 600; color: var(--c-text); }
    .header-spacer { flex: 1; }
    .count-pills {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .count-pill {
      display: flex; flex-direction: column; align-items: center;
      padding: 4px 9px; border-radius: 20px;
      font-size: 10px; font-weight: 500; line-height: 1.3;
      min-width: 40px;
    }
    .count-pill .pill-num { font-size: 16px; font-weight: 700; line-height: 1; }
    .count-pill.cp-present { background: var(--c-present-bg); color: var(--c-present); }
    .count-pill.cp-leave   { background: var(--c-leave-bg);   color: var(--c-leave); }
    .count-pill.cp-absent  { background: var(--c-absent-bg);  color: var(--c-absent); }
    .count-pill.cp-none    { background: var(--c-unchecked-bg); color: var(--c-unchecked); }
    .btn-capture {
      flex-shrink: 0;
      background: var(--c-text);
      color: white;
      border: none; cursor: pointer;
      padding: 8px 14px;
      border-radius: 10px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      transition: background var(--transition), transform var(--transition);
      white-space: nowrap;
    }
    .btn-capture:hover  { background: #334155; }
    .btn-capture:active { transform: scale(0.96); }
    .btn-capture svg    { width: 16px; height: 16px; }
    .btn-reset {
      flex-shrink: 0;
      background: transparent; border: 1.5px solid var(--c-border);
      color: var(--c-muted);
      cursor: pointer; padding: 7px 10px;
      border-radius: 10px;
      font-family: var(--font); font-size: 13px;
      transition: all var(--transition);
    }
    .btn-reset:hover { border-color: var(--c-absent); color: var(--c-absent); }

    /* status toast */
    #status-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: white;
      padding: 10px 22px; border-radius: 30px;
      font-size: 14px; font-weight: 500;
      z-index: 9000; transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    #status-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── Top 3 Section ─── */
    #top3-section {
      flex-shrink: 0;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .top3-label {
      font-size: 11px; font-weight: 600; color: var(--c-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .top3-list {
      display: flex; gap: 8px; flex: 1; overflow: hidden;
    }
    .top3-item {
      display: flex; align-items: center; gap: 6px;
      background: white; border: 1px solid var(--c-border);
      padding: 5px 11px; border-radius: 20px;
      font-size: 13px; font-weight: 500; flex-shrink: 0;
      transition: all var(--transition);
      max-width: 200px;
    }
    .top3-item.filled { border-color: var(--c-present); background: var(--c-present-bg); }
    .top3-item .rank-badge { font-size: 16px; line-height: 1; }
    .top3-item .rank-name  { color: var(--c-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top3-item .rank-tag   { font-size: 10px; font-weight: 700; color: var(--c-present); background: rgba(0,191,99,0.15); padding: 1px 6px; border-radius: 8px; }
    .top3-empty { color: var(--c-muted); font-size: 12px; }

    /* ─── Main Scrollable Content ─── */
    #main-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Student Grid ─── */
    #student-grid {
      display: grid;
      gap: 10px;
    }

    /* Responsive columns */
    @media (max-width: 479px) {
      #student-grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 480px) and (max-width: 767px) {
      #student-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      #student-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) and (max-width: 1279px) {
      #student-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1280px) {
      #student-grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
    }

    /* ─── Student Card ─── */
    .student-card {
      background: white;
      border-radius: var(--r-card);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: box-shadow var(--transition), transform var(--transition);
      overflow: hidden;
      position: relative;
    }
    .student-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-1px); }
    .student-card.s-present { border-left: 3px solid var(--c-present); }
    .student-card.s-absent  { border-left: 3px solid var(--c-absent); }
    .student-card.s-leave   { border-left: 3px solid var(--c-leave); }
    .student-card.s-unchecked { border-left: 3px solid var(--c-border); }

    /* Mobile: horizontal layout */
    @media (max-width: 479px) {
      .card-inner {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 12px;
      }
      .card-avatar-wrap { width: 52px; height: 52px; flex-shrink: 0; }
      .card-info { flex: 1; min-width: 0; }
      .card-num  { font-size: 11px; color: var(--c-muted); font-weight: 500; }
      .card-name { font-size: 14px; font-weight: 600; color: var(--c-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
      .card-btns { display: flex; gap: 5px; }
      .card-note-wrap { width: 100%; }
      .order-badge { top: 8px; left: 8px; }
    }

    /* Tablet+: vertical layout */
    @media (min-width: 480px) {
      .card-inner {
        display: flex; flex-direction: column; align-items: center;
        padding: 14px 10px 12px;
        gap: 8px;
      }
      .card-avatar-wrap { width: 70px; height: 70px; }
      .card-info { width: 100%; text-align: center; }
      .card-num  { font-size: 10px; color: var(--c-muted); font-weight: 500; }
      .card-name { font-size: 13px; font-weight: 600; color: var(--c-text); 
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card-actions { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .card-btns { display: flex; gap: 5px; justify-content: center; width: 100%; }
      .card-note-wrap { width: 100%; }
      .order-badge { top: 8px; right: 8px; }
    }

    .card-avatar-wrap { position: relative; }
    .card-avatar-wrap svg { width: 100%; height: 100%; display: block; }

    .order-badge {
      position: absolute;
      width: 20px; height: 20px;
      background: var(--c-present);
      color: white; font-size: 10px; font-weight: 700;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,191,99,0.4);
    }
    .order-badge.hidden { display: none; }

    /* Status buttons */
    .btn-status {
      flex: 1; max-width: 70px;
      padding: 5px 0;
      border: 1.5px solid;
      border-radius: 8px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
      background: transparent;
    }
    .btn-status.bs-present { border-color: var(--c-present); color: var(--c-present); }
    .btn-status.bs-leave   { border-color: var(--c-leave);   color: var(--c-leave); }
    .btn-status.bs-absent  { border-color: var(--c-absent);  color: var(--c-absent); }
    .btn-status.bs-present.active { background: var(--c-present); color: white; }
    .btn-status.bs-leave.active   { background: var(--c-leave);   color: white; }
    .btn-status.bs-absent.active  { background: var(--c-absent);  color: white; }
    .btn-status:not(.active) { opacity: 0.45; }
    .btn-status:hover { opacity: 1 !important; }
    .btn-status:active { transform: scale(0.94); }

    /* Note input */
    .card-note {
      width: 100%; font-family: var(--font); font-size: 11px;
      border: 1.5px solid var(--c-border); border-radius: 8px;
      padding: 5px 8px; color: var(--c-text); background: var(--c-surface);
      outline: none; transition: border var(--transition);
    }
    .card-note::placeholder { color: var(--c-unchecked); }
    .card-note:focus { border-color: var(--c-present); }
    .card-note-wrap.hidden { display: none; }

    /* ─── Capture Panel (off-screen, for PNG export) ─── */
    #capture-panel {
      position: fixed; left: -9999px; top: 0;
      width: 1080px;
      background: #ffffff;
      font-family: 'Prompt', sans-serif;
      padding: 0;
      z-index: -1;
    }
    .cp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 40px 20px;
      border-bottom: 2px solid #e2e8f0;
      background: #f8fafc;
    }
    .cp-header-left { display: flex; align-items: center; gap: 16px; }
    .cp-logo { height: 54px; width: auto; }
    .cp-title-block { display: flex; flex-direction: column; }
    .cp-title { font-size: 22px; font-weight: 700; color: #1e293b; line-height: 1.2; }
    .cp-subtitle { font-size: 14px; color: #64748b; font-weight: 400; }
    .cp-datetime { text-align: right; }
    .cp-date-big { font-size: 24px; font-weight: 700; color: #1e293b; }
    .cp-day      { font-size: 14px; color: #64748b; }

    .cp-counts {
      display: flex; gap: 0;
      margin: 0 40px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid #e2e8f0;
      margin-top: 20px;
    }
    .cp-count-item {
      flex: 1; padding: 14px 10px; text-align: center;
      border-right: 1px solid #e2e8f0;
    }
    .cp-count-item:last-child { border-right: none; }
    .cp-count-num { font-size: 32px; font-weight: 700; line-height: 1; }
    .cp-count-lbl { font-size: 13px; font-weight: 500; margin-top: 2px; }
    .cp-count-item.ccp { background: #e8fdf1; }
    .cp-count-item.ccp .cp-count-num { color: #00BF63; }
    .cp-count-item.ccp .cp-count-lbl { color: #00994f; }
    .cp-count-item.ccl { background: #fff8e6; }
    .cp-count-item.ccl .cp-count-num { color: #FFB000; }
    .cp-count-item.ccl .cp-count-lbl { color: #cc8d00; }
    .cp-count-item.cca { background: #fff0f0; }
    .cp-count-item.cca .cp-count-num { color: #FF4F4F; }
    .cp-count-item.cca .cp-count-lbl { color: #cc3f3f; }
    .cp-count-item.ccn { background: #f1f5f9; }
    .cp-count-item.ccn .cp-count-num { color: #64748b; }
    .cp-count-item.ccn .cp-count-lbl { color: #475569; }

    .cp-top3 {
      display: flex; gap: 12px; margin: 20px 40px 0;
    }
    .cp-rank-item {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      background: #f8fafc; border: 1px solid #e2e8f0;
    }
    .cp-rank-item.rank-filled { background: #e8fdf1; border-color: #00BF63; }
    .cp-rank-medal { font-size: 26px; line-height: 1; }
    .cp-rank-name  { font-size: 16px; font-weight: 600; color: #1e293b; }
    .cp-rank-tag   { font-size: 11px; font-weight: 700; color: #00BF63; }
    .cp-rank-empty { font-size: 14px; color: #94A3B8; }

    .cp-section-title {
      margin: 20px 40px 12px;
      font-size: 13px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cp-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      margin: 0 40px;
      padding-bottom: 28px;
    }
    .cp-slot {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 8px 4px; border-radius: 10px;
      background: #f8fafc; border: 1px solid #e2e8f0;
    }
    .cp-slot svg { width: 42px; height: 50px; }
    .cp-slot-num { font-size: 11px; font-weight: 600; color: #1e293b; }
    .cp-slot-status { font-size: 10px; font-weight: 500; color: #64748b; }
    .cp-slot-note { font-size: 9px; color: #94A3B8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
    .cp-slot.sp { background: #e8fdf1; border-color: #00BF63; }
    .cp-slot.sl { background: #fff8e6; border-color: #FFB000; }
    .cp-slot.sa { background: #fff0f0; border-color: #FF4F4F; }
    .cp-slot.sp .cp-slot-status { color: #00994f; }
    .cp-slot.sl .cp-slot-status { color: #cc8d00; }
    .cp-slot.sa .cp-slot-status { color: #cc3f3f; }

    /* ─── Header responsive ─── */
    @media (max-width: 600px) {
      .count-pills .count-pill { padding: 3px 6px; min-width: 34px; }
      .count-pills .count-pill .pill-num { font-size: 14px; }
      .count-pills .count-pill { font-size: 9px; }
      .btn-capture span { display: none; }
      .header-datetime .header-date { font-size: 11px; }
    }
    @media (max-width: 400px) {
      #app-header { gap: 8px; padding: 8px 10px; }
      .header-logo { height: 28px; }
      .btn-reset { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     SPLASH SCREEN
═══════════════════════════════════════════ -->
<div id="splash-screen">
  <img src="Asset/icon/intro-logo.svg" alt="Student Check" class="splash-logo">
</div>

<!-- ═══════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header id="app-header">
    <img src="Asset/icon/logo.svg" alt="Logo" class="header-logo">
    <div class="header-datetime">
      <span class="header-day"  id="hdr-day"></span>
      <span class="header-date" id="hdr-date"></span>
    </div>
    <div class="header-spacer"></div>
    <div class="count-pills">
      <div class="count-pill cp-present"><span class="pill-num" id="cnt-present">0</span>มา</div>
      <div class="count-pill cp-leave"  ><span class="pill-num" id="cnt-leave">0</span>ลา</div>
      <div class="count-pill cp-absent" ><span class="pill-num" id="cnt-absent">0</span>ขาด</div>
      <div class="count-pill cp-none"   ><span class="pill-num" id="cnt-unchecked">40</span>ไม่เช็ค</div>
    </div>
    <button class="btn-reset" onclick="resetAll()" title="รีเซ็ตทั้งหมด">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button class="btn-capture" onclick="captureAsPNG()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>บันทึก PNG</span>
    </button>
  </header>

  <!-- Top 3 -->
  <div id="top3-section">
    <div class="top3-label">มาก่อน</div>
    <div class="top3-list" id="top3-list">
      <div class="top3-item" id="rank-1">
        <span class="rank-badge">🥇</span>
        <span class="rank-name top3-empty">รอผู้ท้าชิง</span>
      </div>
      <div class="top3-item" id="rank-2">
        <span class="rank-badge">🥈</span>
        <span class="rank-name top3-empty">รอผู้ท้าชิง</span>
      </div>
      <div class="top3-item" id="rank-3">
        <span class="rank-badge">🥉</span>
        <span class="rank-name top3-empty">รอผู้ท้าชิง</span>
      </div>
    </div>
  </div>

  <!-- Student Grid -->
  <main id="main-content">
    <div id="student-grid"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════════
     CAPTURE PANEL (off-screen, for PNG export)
═══════════════════════════════════════════ -->
<div id="capture-panel">
  <div class="cp-header">
    <div class="cp-header-left">
      <img src="Asset/icon/logo.svg" class="cp-logo" alt="Logo">
      <div class="cp-title-block">
        <div class="cp-title">รายงานการเข้าแถว</div>
        <div class="cp-subtitle" id="cp-subtitle">ชั้นประถมศึกษา</div>
      </div>
    </div>
    <div class="cp-datetime">
      <div class="cp-date-big" id="cp-date"></div>
      <div class="cp-day"      id="cp-day"></div>
    </div>
  </div>

  <div class="cp-counts">
    <div class="cp-count-item ccp">
      <div class="cp-count-num" id="cp-cnt-p">0</div>
      <div class="cp-count-lbl">มา</div>
    </div>
    <div class="cp-count-item ccl">
      <div class="cp-count-num" id="cp-cnt-l">0</div>
      <div class="cp-count-lbl">ลา</div>
    </div>
    <div class="cp-count-item cca">
      <div class="cp-count-num" id="cp-cnt-a">0</div>
      <div class="cp-count-lbl">ขาด</div>
    </div>

<!-- Status Toast -->

<script>
/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
const STUDENTS_DATA = [
  { id:  1, name:  "1", realName: "เลขที่ 1"  },

/* ─── Constants ─── */
const STATUS = { PRESENT: 'present', LEAVE: 'leave', ABSENT: 'absent', UNCHECKED: 'unchecked' };
const STATUS_COLORS = {
  [STATUS.PRESENT]:   '#00BF63',
  [STATUS.LEAVE]:     '#FFB000',
  [STATUS.ABSENT]:    '#FF4F4F',
  [STATUS.UNCHECKED]: '#94A3B8',
};
const STATUS_LABELS = {
  [STATUS.PRESENT]:   'มา',
  [STATUS.LEAVE]:     'ลา',
  [STATUS.ABSENT]:    'ขาด',
  [STATUS.UNCHECKED]: 'ไม่เช็ค',
};
const THAI_DAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

/* ─── App State ─── */
const state = {
  students: STUDENTS_DATA.map(s => ({
    ...s,
    status: STATUS.UNCHECKED,
    note: '',
    checkTime: null,
  }))
};

/* ─── SVG Student Icon ─── */
function studentSVG(color) {
  const c = color;
  // Slightly darker for hair
  const dark = shadeColor(color, -30);
  return `<svg viewBox="0 0 40 52" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="14" r="12" fill="${c}"/>
    <path d="M8 12 Q8 2 20 2 Q32 2 32 12" fill="${dark}"/>
    <circle cx="15.5" cy="13" r="2.2" fill="rgba(255,255,255,0.92)"/>
    <circle cx="24.5" cy="13" r="2.2" fill="rgba(255,255,255,0.92)"/>
    <path d="M14.5 18.5 Q20 22 25.5 18.5" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M5 34 C5 27 12 25 20 25 C28 25 35 27 35 34 L36 51 Q36 52 34 52 L6 52 Q4 52 4 51 Z" fill="${c}"/>
    <path d="M17 25 L20 29.5 L23 25" fill="rgba(255,255,255,0.28)"/>
  </svg>`;
}

function shadeColor(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + pct));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00ff) + pct));
  const b = Math.max(0, Math.min(255, (num & 0x0000ff) + pct));
  return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

/* ─── Date/Time Helpers ─── */
function getNow() { return new Date(); }
function formatDate(d) {
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function formatTime(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} น.`;
}

/* ─── Render Student Card ─── */
function renderCard(student) {
  const color = STATUS_COLORS[student.status];
  const statusClass = {
    [STATUS.PRESENT]:   's-present',
    [STATUS.LEAVE]:     's-leave',
    [STATUS.ABSENT]:    's-absent',
    [STATUS.UNCHECKED]: 's-unchecked',
  }[student.status];

  const presentStudents = getPresentSorted();
  const orderIndex = presentStudents.findIndex(s => s.id === student.id);
  const orderNum = orderIndex >= 0 ? orderIndex + 1 : null;

  const noteHidden = student.status === STATUS.UNCHECKED ? 'hidden' : '';
  const noteVal = student.note ? `value="${student.note.replace(/"/g,'&quot;')}"` : '';

  return `
    <div class="student-card ${statusClass}" id="card-${student.id}" data-id="${student.id}">
      <div class="card-inner">
        <div class="card-avatar-wrap">
          ${studentSVG(color)}
          <div class="order-badge ${orderNum ? '' : 'hidden'}" id="badge-${student.id}">${orderNum || ''}</div>
        </div>
        <div class="card-info">
          <div class="card-num">เลขที่ ${student.name}</div>
          <div class="card-name">${student.realName}</div>
        </div>
        <div class="card-actions">
          <div class="card-btns">
            <button class="btn-status bs-present ${student.status===STATUS.PRESENT?'active':''}"
              onclick="setStatus(${student.id},'${STATUS.PRESENT}')">มา</button>
            <button class="btn-status bs-leave ${student.status===STATUS.LEAVE?'active':''}"
              onclick="setStatus(${student.id},'${STATUS.LEAVE}')">ลา</button>
            <button class="btn-status bs-absent ${student.status===STATUS.ABSENT?'active':''}"
              onclick="setStatus(${student.id},'${STATUS.ABSENT}')">ขาด</button>
          </div>
          <div class="card-note-wrap ${noteHidden}">
            <input class="card-note" id="note-${student.id}" type="text" maxlength="40"
              placeholder="หมายเหตุ (ไม่บังคับ)" ${noteVal}
              onchange="setNote(${student.id}, this.value)"
              oninput="setNote(${student.id}, this.value)">
          </div>
        </div>
      </div>
    </div>`;
}

/* ─── Get Present Students Sorted by Check Time (earliest first) ─── */
function getPresentSorted() {
  return state.students
    .filter(s => s.status === STATUS.PRESENT)
    .sort((a, b) => a.checkTime - b.checkTime);
}

/* ─── Initial Render ─── */
function renderGrid() {
  const grid = document.getElementById('student-grid');
  grid.innerHTML = state.students.map(s => renderCard(s)).join('');
}

/* ─── Set Status (ported from ButtonCheck.cs SetStatus) ─── */
function setStatus(id, newStatus) {
  const student = state.students.find(s => s.id === id);
  if (!student) return;

  // If clicking the same active status → deselect (back to unchecked)
  if (student.status === newStatus) {
    student.status = STATUS.UNCHECKED;
    student.checkTime = null;
  } else {
    student.status = newStatus;
    student.checkTime = (newStatus === STATUS.PRESENT) ? Date.now() : null;
  }

  updateCard(student);
  updateCountSummary();
  updateTop3();
  updateAllOrderBadges();
}

/* ─── Set Note (ported from ButtonCheck ช่องกิจกรรม) ─── */
function setNote(id, text) {
  const student = state.students.find(s => s.id === id);
  if (student) student.note = text;
}

/* ─── Update Single Card DOM (no full re-render → high performance) ─── */
function updateCard(student) {
  const cardEl = document.getElementById(`card-${student.id}`);
  if (!cardEl) return;

  const color = STATUS_COLORS[student.status];
  const statusClass = {
    [STATUS.PRESENT]:   's-present',
    [STATUS.LEAVE]:     's-leave',
    [STATUS.ABSENT]:    's-absent',
    [STATUS.UNCHECKED]: 's-unchecked',
  }[student.status];

  // update border color class
  cardEl.className = `student-card ${statusClass}`;

  // update avatar SVG
  const avatarWrap = cardEl.querySelector('.card-avatar-wrap');
  const badge = avatarWrap.querySelector('.order-badge');
  const svg = avatarWrap.querySelector('svg');
  if (svg) svg.outerHTML; // will be replaced below
  avatarWrap.innerHTML = studentSVG(color) +
    `<div class="order-badge hidden" id="badge-${student.id}"></div>`;

  // update buttons
  const btns = cardEl.querySelectorAll('.btn-status');
  btns[0].className = `btn-status bs-present${student.status===STATUS.PRESENT?' active':''}`;
  btns[1].className = `btn-status bs-leave${student.status===STATUS.LEAVE?' active':''}`;
  btns[2].className = `btn-status bs-absent${student.status===STATUS.ABSENT?' active':''}`;

  // show/hide note input
  const noteWrap = cardEl.querySelector('.card-note-wrap');
  if (student.status === STATUS.UNCHECKED) noteWrap.classList.add('hidden');
  else noteWrap.classList.remove('hidden');
}

/* ─── Update all order badges (ported from SetTouchScreenOrder) ─── */
function updateAllOrderBadges() {
  const presentSorted = getPresentSorted();
  state.students.forEach(s => {
    const badge = document.getElementById(`badge-${s.id}`);
    if (!badge) return;
    const idx = presentSorted.findIndex(p => p.id === s.id);
    if (idx >= 0) {
      badge.textContent = idx + 1;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  });
}

/* ─── Update Count Summary (ported from UpdateCountSummary) ─── */
function updateCountSummary() {
  let p = 0, l = 0, a = 0, n = 0;
  state.students.forEach(s => {
    if (s.status === STATUS.PRESENT)   p++;
    else if (s.status === STATUS.LEAVE)   l++;
    else if (s.status === STATUS.ABSENT)  a++;
    else n++;
  });
  document.getElementById('cnt-present').textContent   = p;
  document.getElementById('cnt-leave').textContent     = l;
  document.getElementById('cnt-absent').textContent    = a;
  document.getElementById('cnt-unchecked').textContent = n;
}

/* ─── Update Top 3 (ported from Text_TopRanks / funnyPhrases) ─── */
function updateTop3() {
  const presentSorted = getPresentSorted();
  const medals = ['🥇','🥈','🥉'];
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`rank-${i+1}`);
    if (!el) continue;
    if (i < presentSorted.length) {
      const s = presentSorted[i];
      const name = s.realName || s.name;
      const tag = i === 0 ? `<span class="rank-tag">MVP</span>` : '';
      el.innerHTML = `<span class="rank-badge">${medals[i]}</span>
        <span class="rank-name">${name}</span>${tag}`;
      el.classList.add('filled');
    } else {
      el.innerHTML = `<span class="rank-badge">${medals[i]}</span>
        <span class="rank-name top3-empty">รอผู้ท้าชิง</span>`;
      el.classList.remove('filled');
    }
  }
}

/* ─── Update Clock/Date in Header ─── */
function updateClock() {
  const now = getNow();
  document.getElementById('hdr-day').textContent  = `วัน${THAI_DAYS[now.getDay()]}`;
  document.getElementById('hdr-date').textContent = `${formatDate(now)}  ${formatTime(now)}`;
}

/* ─── Reset All (confirmation dialog) ─── */
function resetAll() {
  if (!confirm('รีเซ็ตการเช็คชื่อทั้งหมดหรือไม่?')) return;
  state.students.forEach(s => {
    s.status = STATUS.UNCHECKED;
    s.checkTime = null;
    s.note = '';
  });
  renderGrid();
  updateCountSummary();
  updateTop3();
}

/* ─── Show Toast ─── */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('status-toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── Build Capture Panel ─── */
function buildCapturePanel() {
  const now = getNow();
  document.getElementById('cp-date').textContent = formatDate(now);
  document.getElementById('cp-day').textContent  = `วัน${THAI_DAYS[now.getDay()]}`;

  let p = 0, l = 0, a = 0, n = 0;
  state.students.forEach(s => {
    if (s.status === STATUS.PRESENT) p++;
    else if (s.status === STATUS.LEAVE) l++;
    else if (s.status === STATUS.ABSENT) a++;
    else n++;
  });
  document.getElementById('cp-cnt-p').textContent = p;
  document.getElementById('cp-cnt-l').textContent = l;
  document.getElementById('cp-cnt-a').textContent = a;
  document.getElementById('cp-cnt-n').textContent = n;

  // Top 3
  const presentSorted = getPresentSorted();
  const medals = ['🥇','🥈','🥉'];
  let top3Html = '';
  for (let i = 0; i < 3; i++) {
    if (i < presentSorted.length) {
      const s = presentSorted[i];
      const name = s.realName || s.name;
      const mvp = i === 0 ? `<div class="cp-rank-tag">MVP 🏆</div>` : '';
      top3Html += `<div class="cp-rank-item rank-filled">
        <div class="cp-rank-medal">${medals[i]}</div>
        <div><div class="cp-rank-name">${name}</div>${mvp}</div>
      </div>`;
    } else {
      top3Html += `<div class="cp-rank-item">
        <div class="cp-rank-medal">${medals[i]}</div>
        <div class="cp-rank-empty">รอผู้ท้าชิง</div>
      </div>`;
    }
  }
  document.getElementById('cp-top3').innerHTML = top3Html;

  // Build sorted student list: มา first (by time), then others in original order
  const others = state.students.filter(s => s.status !== STATUS.PRESENT);
  const sorted = [...presentSorted, ...others];

  let gridHtml = '';
  sorted.forEach((s, idx) => {
    const color  = STATUS_COLORS[s.status];
    const cls    = { present:'sp', leave:'sl', absent:'sa', unchecked:'' }[s.status];
    const label  = STATUS_LABELS[s.status];
    const note   = s.note ? `<div class="cp-slot-note">${s.note}</div>` : '';
    const orderBadge = s.status === STATUS.PRESENT
      ? `<div style="font-size:9px;color:#00994f;font-weight:700;">#${idx+1}</div>` : '';
    gridHtml += `<div class="cp-slot ${cls}">
      ${studentSVG(color)}
      <div class="cp-slot-num">เลขที่ ${s.name}</div>
      <div class="cp-slot-status">${label}</div>
      ${orderBadge}${note}
    </div>`;
  });
  document.getElementById('cp-grid').innerHTML = gridHtml;
}

/* ─── Capture As PNG (ported from Screenshot.cs CaptureDisplay2) ─── */
async function captureAsPNG() {
  showToast('⏳ กำลังสร้างภาพ...');
  buildCapturePanel();

  const panel = document.getElementById('capture-panel');
  // Temporarily move on-screen for rendering
  panel.style.left  = '0';
  panel.style.top   = '0';
  panel.style.zIndex = '9998';
  panel.style.visibility = 'hidden';

  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 150)); // let fonts render

  try {
    const canvas = await html2canvas(panel, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true,
      allowTaint: false,
      logging: false,
      width: panel.scrollWidth,
      height: panel.scrollHeight,
      windowWidth: panel.scrollWidth,
    });

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const now = getNow();
      const dateStr = `${String(now.getDate()).padStart(2,'0')}_${String(now.getMonth()+1).padStart(2,'0')}_${now.getFullYear()}`;
      a.href = url;
      a.download = `เช็คชื่อเข้าแถววันที่_${dateStr}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ บันทึกเรียบร้อย!');
    }, 'image/png');

  } catch (err) {
    console.error('Capture error:', err);
    showToast('❌ บันทึกไม่สำเร็จ');
  } finally {
    panel.style.left       = '-9999px';
    panel.style.top        = '0';
    panel.style.zIndex     = '-1';
    panel.style.visibility = 'visible';
  }
}

/* ─── Initialise ─── */
function init() {
  renderGrid();
  updateCountSummary();
  updateTop3();
  updateClock();
  setInterval(updateClock, 30000);
}

document.addEventListener('DOMContentLoaded', init);
