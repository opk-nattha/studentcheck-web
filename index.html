<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check</title>
    <link rel="icon" type="svg+xml" href="Asset/icon/logo.svg">
    <link rel="alternate icon" type="image/png" href="Asset/icon/favicon-32x32.png">
    <link rel="shortcut icon" href="Asset/icon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="Asset/icon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Student Check">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="preconnect" href="https://fonts.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap');
        
        /* 1. รีเซ็ตค่าเริ่มต้นของเบราว์เซอร์ให้ตรงกันทุกเครื่อง */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 2. ตั้งค่าพื้นหลังของหน้าเว็บ (body) */
        body {
            font-family: 'Chakra Petch';
            background: linear-gradient(180deg, #5ed0e6 0%, #0078a6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: top;
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            /* svg */
            overflow: hidden; 
            position: relative;
        }
        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* ดันไปอยู่หลังสุด */
            opacity: 0.6; /* ปรับความโปร่งใสไม่ให้กวนสายตา */
        }
        /* -------------------------------------
           🔥 กรอบสีขาวขนาดใหญ่ สไตล์ตามที่คุณต้องการ
           ------------------------------------- */
        .app-container {
            background-color: #ffffff; 
            border: 2px solid #1a365d; 
            border-radius: 20px; 
            box-shadow: 0 12px 35px rgba(26, 54, 93, 0.15); 
            z-index: 1; 

            /* 1. จัดการความกว้างแบบยืดหยุ่น */
            width: 100%;
            margin: 20px; /* บังคับเว้นระยะจากขอบจอทุกด้าน 20px เสมอ (จะได้เห็นพื้นหลัง) */

            /* 2. จัดการความสูงไม่ให้ล้นจอ */
            max-height: 80vh; /* สูงสุดได้แค่ 80% ของหน้าจอ */
            
            /* 3. จัดเลย์เอาต์ภายใน */
            display: flex;
            flex-direction: column; /* เรียงของจากบนลงล่าง */
            padding: 25px; 
        }

        /* ==========================================
           ตกแต่งหน้าจอ Splash Screen
           ========================================== */
        #splash-screen {
            position: fixed; /* บังคับให้ลอยทับทุกอย่างบนหน้าจอ */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f4f8; /* สีพื้นหลังของหน้าโหลด (เปลี่ยนได้ตามชอบ) */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* ดันให้อยู่ชั้นบนสุด ทับทุกสิ่ง */
            
            /* สั่งให้หน้าจอโหลดจางหายไปเมื่อเวลาผ่านไป 3.5 วินาที */
            animation: hideSplash 3.5s ease-in-out forwards;
        }

        .splash-logo {
            width: 512px; /* ปรับขนาดโลโก้ตอนเปิดแอปตามต้องการ */
            opacity: 0; /* เริ่มต้นให้โลโก้มองไม่เห็น */
            
            /* สั่งให้โลโก้ ค่อยๆ สว่างขึ้น แล้วจางลง ในเวลา 3 วินาที */
            animation: fadeInOut 3s ease-in-out forwards;
        }

        /* -------------------------------------
           คิวถ่ายทำแอนิเมชัน (Keyframes)
           ------------------------------------- */
        
        /* แอนิเมชันสำหรับตัวโลโก้ */
        @keyframes fadeInOut {
            0%   { opacity: 0; transform: scale(0.9); } /* เริ่มต้น: ล่องหน และหดตัวนิดนึง */
            20%  { opacity: 1; transform: scale(1); }   /* วินาทีที่ 0.6: สว่างเต็มที่ ขนาดปกติ */
            80%  { opacity: 1; transform: scale(1); }   /* ค้างความสว่างไว้ให้คนมองเห็น */
            100% { opacity: 0; transform: scale(1.1); } /* ตอนจบ: ล่องหน และขยายตัวออกนิดนึง */
        }

        /* แอนิเมชันสำหรับพื้นหลังหน้าโหลด */
        @keyframes hideSplash {
            0%   { opacity: 1; visibility: visible; }
            85%  { opacity: 1; visibility: visible; }   /* รอให้โลโก้แสดงให้เสร็จก่อน */
            100% { opacity: 0; visibility: hidden; }    /* ล่องหน และหลบทางให้เรากดปุ่มในแอปได้ */
        }

        /* ==========================================
           iPhone SE2
           ========================================== */
        @media screen and (max-width: 768px) {
            
            /* 1. ย่อขนาดโลโก้ Splash Screen ลงมาครึ่งนึง */
            .splash-logo {
                width: 256px; 
            }

            /* 2. ปรับกล่องแอปให้ขอบมนน้อยลง และลดระยะห่าง (Padding/Margin) */
            .app-container {
                border-radius: 8px; /* จากเดิม 20px เหลือ 4px */
                padding: 16px; /* พื้นที่ข้างในกล่องแคบลง */
                margin: 4px; /* ชิดขอบจอมือถือมากขึ้น */
                max-height: 85vh; /* สูงสุดได้แค่ 90% ของหน้าจอ */
            }

            /* 3. ลดขนาดตัวอักษรหัวข้อ */
            h1 {
                font-size: 20px;     /* ให้ฟอนต์เล็กลงพอดีจอมือถือ */
                margin-bottom: 16px; 
            }
        }
          /* ==========================================
           iPad A16
           ========================================== */
        @media screen and (max-width: 1640px) {
            
            /* 1. ย่อขนาดโลโก้ Splash Screen ลงมาครึ่งนึง */
            .splash-logo {
                width: 512px; 
            }

            /* 2. ปรับกล่องแอปให้ขอบมนน้อยลง และลดระยะห่าง (Padding/Margin) */
            .app-container {
                border-radius: 20px; /* จากเดิม 20px เหลือ 4px */
                padding: 24px; /* พื้นที่ข้างในกล่องแคบลง */
                margin: 20px; /* ชิดขอบจอมือถือมากขึ้น */
                max-height: 90vh; /* สูงสุดได้แค่ 90% ของหน้าจอ */
            }
        }

    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="Asset/icon/intro-logo.svg" alt="Intro Logo" class="splash-logo">
    </div>
    
    <svg class="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15"></feGaussianBlur>
            </filter>
        </defs>
        <circle cx="20" cy="20" r="30" fill="#00bf63" filter="url(#blur)"></circle>
        <circle cx="80" cy="80" r="40" fill="#00bf63" filter="url(#blur)"></circle>
    </svg>

    <div class="app-container">
        <h1>ระบบเช็คชื่อเข้าแถว</h1>
        </div>
    
</body>
</html>
