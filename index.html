<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Check</title>

  <!--
    [SECURITY FIX] เพิ่ม Content-Security-Policy
    - script-src 'self'        → อนุญาตเฉพาะ JS จาก origin เดียวกัน (ป้องกัน XSS / script injection)
    - style-src 'self' + googleapis → อนุญาต Google Fonts stylesheet
    - font-src 'self' + gstatic → อนุญาต font file จาก Google
    - img-src 'self' blob: data: → รองรับ PNG download (blob URL) และ data URI
    - worker-src 'self'        → อนุญาต Service Worker
    - connect-src 'self'       → ป้องกัน fetch ไปยัง origin อื่น
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' blob: data:;
                 connect-src 'self';
                 worker-src 'self'">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="icon"           type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="alternate icon" type="image/png"     href="assets/icons/favicon-32x32.png">
  <link rel="shortcut icon"                       href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180"    href="assets/icons/apple-touch-icon.png">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable"          content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title"            content="Student Check">

  <!-- Android PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color"            content="#ffffff">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen" aria-hidden="true">
    <img src="assets/images/intro-logo.svg" alt="Student Check" class="splash-logo">
  </div>

  <!-- Main App -->
  <div id="app">
    <header id="app-header"></header>
    <div id="top3-section"></div>
    <main id="main-content">
      <div id="student-grid"></div>
    </main>
  </div>

  <!--
    [CLEANUP] ลบ <div id="capture-panel"> ออก
    - ไม่ได้ใช้งานจริง: screenshot.js สร้าง <canvas> ตรงๆ ด้วย document.createElement('canvas')
    - ไม่เคย populate HTML ลงไปใน #capture-panel เลย
    - CSS .cp-* ที่เกี่ยวข้องก็ dead code เช่นกัน → ลบออกใน style.css ด้วย
  -->

  <!-- Status toast -->
  <div id="status-toast"></div>

  <!-- Android PWA Install Banner -->
  <div id="pwa-install-banner" class="pwa-banner" role="dialog" aria-label="เพิ่มแอปไปยังหน้าจอหลัก" hidden>
    <div class="pwa-banner-content">
      <img src="assets/icons/apple-touch-icon.png" alt="Student Check icon" class="pwa-banner-icon">
      <div class="pwa-banner-text">
        <strong>เพิ่มไปยังหน้าจอหลัก</strong>
        <span>ใช้งานได้เหมือนแอปจริง — รวดเร็ว ไม่ต้องเปิดเบราว์เซอร์</span>
      </div>
    </div>
    <div class="pwa-banner-actions">
      <button id="pwa-install-btn" class="pwa-btn-install">ติดตั้ง</button>
      <button id="pwa-dismiss-btn" class="pwa-btn-dismiss" aria-label="ปิด">✕</button>
    </div>
  </div>

  <!-- Scripts (ES Modules) -->
  <script type="module" src="src/app.js"></script>

</body>
</html>
